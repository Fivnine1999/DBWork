{% extends "base.html" %}

{% block title %}登录 - 科研项目管理系统{% endblock %}

{% block header %}
{% endblock %}

{% block content %}
<style>
    body {
        background: url("{{ url_for('static', filename='images/login-bg.png') }}") no-repeat center center fixed;
        background-size: cover;
        margin: 0;
        padding: 0 !important;
        overflow: hidden;
    }
    
    .container {
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
    }
    
    .content {
        background: transparent !important;
        padding: 0 !important;
        box-shadow: none !important;
        margin: 0 !important;
    }
</style>
<div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="width: fit-content; background: white; padding: 40px 50px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
        <h2 style="text-align: center; margin-bottom: 20px; color: #667eea;">科研项目管理系统</h2>
        
        <form method="POST" style="width: 350px;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">登录</button>
        </form>
    </div>
</div>
{% endblock %}
